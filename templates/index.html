<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Calyx</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.18);
      --glass-shine: rgba(255, 255, 255, 0.25);
      --text: #ffffff;
      --text-dim: rgba(255,255,255,0.55);
      --accent: #ff6b8a;
      --accent-glow: rgba(255, 107, 138, 0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: url("/static/img.jpeg") no-repeat center/cover fixed;
      padding: 20px;
      gap: 28px;
      font-family: 'Jost', sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Dark overlay for depth */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(10,5,30,0.55) 0%, rgba(80,10,30,0.4) 100%);
      z-index: 0;
    }

    /* Animated orbs behind everything */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      z-index: 0;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb-1 { width: 420px; height: 420px; background: #c9184a; top: -100px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 350px; height: 350px; background: #6a0572; bottom: -80px; right: -80px; animation-delay: -5s; }
    .orb-3 { width: 250px; height: 250px; background: #ff6b8a; top: 40%; left: 60%; animation-delay: -2s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    /* Welcome section */
    .welcome-section {
      text-align: center;
      color: white;
      z-index: 1;
      animation: fadeDown 0.9s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .welcome-section .eyebrow {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 0.85rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .welcome-section h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.2rem;
      font-weight: 300;
      line-height: 1.15;
      text-shadow: 0 4px 30px rgba(0,0,0,0.5);
      letter-spacing: -0.01em;
    }

    .welcome-section h1 span {
      font-weight: 600;
      font-style: italic;
    }

    /* Glass card */
    .container {
      z-index: 1;
      width: 92%;
      max-width: 420px;
      padding: 44px 40px;
      background: var(--glass-bg);
      border-radius: 28px;
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 1px solid var(--glass-border);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.05) inset,
        0 20px 60px rgba(0,0,0,0.45),
        0 1px 0 var(--glass-shine) inset;
      animation: fadeUp 1s cubic-bezier(.16,1,.3,1) 0.15s both;
      position: relative;
      overflow: hidden;
    }

    /* Top shine streak */
    .container::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.9rem;
      font-weight: 400;
      color: white;
      text-align: center;
      margin-bottom: 36px;
      letter-spacing: 0.02em;
    }

    /* Flash messages */
    .flash-error {
      background: rgba(255,60,60,0.2);
      border: 1px solid rgba(255,60,60,0.4);
      padding: 11px 15px; border-radius: 12px;
      margin-bottom: 20px; font-size: 13.5px; color: #ffaaaa;
    }
    .flash-success {
      background: rgba(60,200,100,0.2);
      border: 1px solid rgba(60,200,100,0.35);
      padding: 11px 15px; border-radius: 12px;
      margin-bottom: 20px; font-size: 13.5px; color: #aaffcc;
    }

    /* Input groups */
    .input-group {
      margin-bottom: 28px;
      position: relative;
    }

    .input-group label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
      transition: color 0.3s;
    }

    .input-group:focus-within label {
      color: var(--accent);
    }

    .input-group input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      outline: none;
      color: white;
      font-family: 'Jost', sans-serif;
      font-size: 15px;
      font-weight: 300;
      padding: 13px 16px;
      transition: all 0.3s;
    }

    .input-group input::placeholder { color: rgba(255,255,255,0.25); }

    .input-group input:focus {
      background: rgba(255,255,255,0.12);
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* Options row */
    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 28px;
      color: var(--text-dim);
    }

    .options label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .options input[type="checkbox"] {
      width: 15px; height: 15px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .options a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 400;
      transition: opacity 0.2s;
    }
    .options a:hover { opacity: 0.75; }

    /* Login button */
    .login-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #ff6b8a 0%, #c9184a 100%);
      color: white;
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 28px var(--accent-glow);
      position: relative;
      overflow: hidden;
    }

    .login-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      border-radius: inherit;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 36px rgba(201,24,74,0.55);
    }

    .login-btn:active { transform: translateY(0); }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0 18px;
      color: var(--text-dim);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.12);
    }

    /* Register link */
    .register-text {
      text-align: center;
      font-size: 13.5px;
      color: var(--text-dim);
    }

    .register-text a {
      color: white;
      font-weight: 500;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.3);
      padding-bottom: 1px;
      transition: border-color 0.2s, color 0.2s;
    }
    .register-text a:hover { color: var(--accent); border-color: var(--accent); }

    /* Calyx brand mark bottom */
    .brand-mark {
      position: absolute;
      bottom: 18px;
      right: 22px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
    }

    @media (max-width: 480px) {
      .welcome-section h1 { font-size: 2.4rem; }
      .container { padding: 36px 26px; }
    }
  </style>
</head>
<body>

  <!-- Ambient orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="welcome-section">
    <p class="eyebrow">Your safety companion</p>
    <h1>How can I<br><span>help You?</span></h1>
  </div>

  <div class="container">
    <h2 class="card-title">Welcome Back</h2>



    <form method="POST" action="/">

      <div class="input-group">
        <label for="username">Username or Email</label>
        <input type="text" id="username" name="username" placeholder="you@example.com" required>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>

      <div class="options">
        <label><input type="checkbox"> Remember me</label>
        <a href="#">Forgot Password?</a>
      </div>

      <button type="submit" class="login-btn">Sign In</button>

      <div class="divider">or</div>

      <div class="register-text">
        New to Calyx? <a href="/register">Create an account</a>
      </div>

    </form>

    <div class="brand-mark">Calyx</div>
  </div>

</body>
</html>
